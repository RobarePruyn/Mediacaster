# ==========================================================================
# Multicast Streamer — nginx Configuration
# ==========================================================================
# Reverse proxy for the FastAPI backend and static file server for the
# React frontend SPA (built by Vite into frontend/dist/).
#
# IMPORTANT: The default server block in /etc/nginx/nginx.conf must be
# disabled or removed, otherwise it shadows this config since both use
# server_name _ on port 80. deploy.sh handles this automatically by
# commenting out the block.
# ==========================================================================

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    # Catch-all server name — respond to any Host header
    server_name _;

    # TLS certificate — deploy.sh generates a self-signed cert if none exists.
    # Replace these with real certs (e.g., from Let's Encrypt) for production.
    ssl_certificate /etc/pki/tls/certs/mediacaster.crt;
    ssl_certificate_key /etc/pki/tls/private/mediacaster.key;

    # Modern TLS settings — disable old protocols and weak ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Serve the Vite production build
    root /opt/multicast-streamer/frontend/dist;
    index index.html;

    # Vite outputs hashed filenames in /assets/ that are safe to cache
    # aggressively — the hash changes whenever content changes
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Reverse proxy to the FastAPI/uvicorn backend on localhost:8000.
    # All API routes are prefixed with /api/ by the frontend client.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Large body limit for video file uploads (up to 2GB)
        client_max_body_size 2048m;
        # Long timeouts for transcoding — the upload endpoint blocks while
        # ffmpeg normalizes the file, which can take several minutes for
        # large videos
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # noVNC websocket proxy — routes /novnc/<port>/ requests to the websockify
    # instance running on that port inside the browser source container.
    # This keeps everything under HTTPS so the browser doesn't block mixed content.
    # The port is dynamically assigned (6080 + display_number).
    location ~ ^/novnc/(\d+)/(.*) {
        set $novnc_port $1;
        proxy_pass http://127.0.0.1:$novnc_port/$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # FastAPI auto-generated documentation endpoints — proxied to the backend
    # so they're accessible at the same origin as the frontend
    location /docs { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }

    # SPA fallback — any route not matched above serves index.html, allowing
    # React Router to handle client-side routing. try_files first checks for
    # a real file (images, favicon, etc.) before falling back.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
