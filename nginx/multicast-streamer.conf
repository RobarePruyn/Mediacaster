# ==========================================================================
# Multicast Streamer — nginx Configuration
# ==========================================================================
# Reverse proxy for the FastAPI backend and static file server for the
# React frontend SPA. Also includes a WebSocket proxy block for noVNC
# browser source preview (see known issue note below).
#
# IMPORTANT: The default server block in /etc/nginx/nginx.conf (lines 37-45)
# must be commented out or removed, otherwise it shadows this config since
# both use server_name _ on port 80. deploy.sh removes default.conf but
# the embedded block in nginx.conf must be handled manually.
# ==========================================================================

server {
    listen 80;
    # Catch-all server name — respond to any Host header
    server_name _;
    # Serve the React production build (created by npm run build)
    root /opt/multicast-streamer/frontend/build;
    index index.html;

    # CRA (Create React App) outputs hashed filenames in /static/ that are
    # safe to cache aggressively — the hash changes whenever content changes
    location /static/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Reverse proxy to the FastAPI/uvicorn backend on localhost:8000.
    # All API routes are prefixed with /api/ by the frontend client.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Large body limit for video file uploads (up to 2GB)
        client_max_body_size 2048m;
        # Long timeouts for transcoding — the upload endpoint blocks while
        # ffmpeg normalizes the file, which can take several minutes for
        # large videos
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # noVNC WebSocket proxy — routes /novnc/{port}/path to localhost:{port}/path
    #
    # KNOWN ISSUE: This block uses a regex capture ($1) as a variable in
    # proxy_pass, which requires nginx to resolve the upstream at request
    # time. Without a `resolver` directive this works for localhost but is
    # fragile. The current production workaround is to have the noVNC iframe
    # connect directly to the websockify port (6080-6180 range opened in
    # the firewall), bypassing this proxy entirely.
    #
    # Supports WebSocket upgrade for the VNC binary protocol
    location ~ ^/novnc/(\d+)/(.*) {
        set $novnc_port $1;
        proxy_pass http://127.0.0.1:$novnc_port/$2$is_args$args;
        # HTTP/1.1 is required for WebSocket upgrade (HTTP/1.0 doesn't support it)
        proxy_http_version 1.1;
        # These headers trigger nginx's WebSocket proxying — without them,
        # nginx treats the connection as a normal HTTP request and closes it
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # 24-hour timeout — VNC sessions can run for extended periods and
        # the WebSocket must stay open the entire time
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # FastAPI auto-generated documentation endpoints — proxied to the backend
    # so they're accessible at the same origin as the frontend
    location /docs { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; }

    # SPA fallback — any route not matched above serves index.html, allowing
    # React Router to handle client-side routing. try_files first checks for
    # a real file (images, favicon, etc.) before falling back.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
